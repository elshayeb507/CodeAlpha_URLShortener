<!DOCTYPE html>
<html lang="en">

  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Link Not Found</title>
    <style>
      * {
        box-sizing: border-box;
      }

      body {
        font-family: 'Segoe UI', Arial, sans-serif;
        background: #E6F2DD;
        min-height: 100vh;
        margin: 0;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      .card {
        background: #ffffff;
        padding: 40px 30px;
        border-radius: 16px;
        box-shadow: 0 10px 30px rgba(101, 146, 135, 0.25);
        width: 100%;
        max-width: 420px;
        text-align: center;
        border: 1px solid #B1D3B9;
      }

      h2 {
        color: #659287;
        margin-top: 0;
      }

      p {
        color: #555;
      }

      a {
        display: inline-block;
        margin-top: 15px;
        padding: 10px 20px;
        background: #88BDA4;
        color: white;
        text-decoration: none;
        border-radius: 8px;
        font-weight: bold;
        transition: background 0.2s;
      }

      a:hover {
        background: #659287;
      }
    </style>
  </head>

  <body>
    <div class="card">
      <h2>Link Not Found</h2>
      <p>This short URL doesn't exist </p>
      <a href="/">Go back</a>
    </div>
  </body>

</html>
